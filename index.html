<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古辞書語彙DB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>古辞書語彙DB</h1>
  
  <div class="search-section">
    <div class="search-grid">
      <div class="field">
        <label for="s-word">漢字</label>
        <input type="text" id="s-word" placeholder="例：伊勢">
      </div>
      <div class="field">
        <label for="s-reading">読み</label>
        <input type="text" id="s-reading" placeholder="例：いせ">
      </div>
      <div class="field">
        <label for="s-note">注記</label>
        <input type="text" id="s-note" placeholder="例：勢州">
      </div>
      <div class="field btn-container">
        <button id="search-btn">検索</button>
      </div>
    </div>
    
    <div class="search-options">
      <label class="toggle-control">
        <input type="checkbox" id="ignore-diacritics" checked>
        <span class="control-label">濁点・かなを区別しない</span>
      </label>
      <div id="count-display">該当件数: <span id="count">0</span> 件</div>
    </div>
  </div>

  <div class="filter-section">
    <span class="filter-label">出典フィルタ:</span>
    <div id="source-filters"></div>
  </div>
</header>

<main>
  <div id="list" class="grid-container"></div>
</main>

<script src="script.js"></script>

</body>
</html>
